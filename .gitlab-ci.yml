image: gradle:8.13-jdk21-corretto

services:
  - docker:dind

variables:
  DOCKER_DRIVER: overlay2
  DATABASE_HOST: db
  DATABASE_PORT: 3306
  DATABASE_NAME: jaapec_tenant_service
  DATABASE_USER: dbuser
  DATABASE_PASSWORD: dbpasss
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_LOGIN: kcrqwise
  RABBITMQ_PASSWORD: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
  RABBITMQ_EXCHANGE: domain_events
  RABBITMQ_MAX_RETRIES: 5
  RABBITMQ_VHOST: kcrqwise

stages:
  - build
  - test
  - deploy_dev
  - deploy_prod

build:
  stage: build
  image: gradle:8.7-jdk21
  script:
    - chmod +x gradlew
    - ./gradlew build -x test -x spotlessJavaCheck --no-daemon
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1h

test:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker-compose -f docker-compose-test.yml up -d
    # Esperar a que MariaDB esté listo
    - |
      echo "⌛ Esperando a que MariaDB esté listo..."
      until docker exec mariadb mysql -u"$DATABASE_USER" -p"$DATABASE_PASSWORD" -e "SELECT 1;"; do
        echo "⏳ Aún no está disponible MariaDB..."
        sleep 2
      done

    # Esperar a que RabbitMQ esté listo
    - |
      echo "⌛ Esperando a que RabbitMQ esté listo..."
      until curl -s -u "$RABBITMQ_LOGIN:$RABBITMQ_PASSWORD" "http://localhost:15672/api/healthchecks/node"; do
        echo "⏳ Aún no está disponible RabbitMQ..."
        sleep 2
      done
  script:
    - chmod +x gradlew
    - ./gradlew test
  after_script:
    - docker-compose -f docker-compose-test.yml down
  artifacts:
    reports:
      junit: build/test-results/test/*.xml

qodana:
  stage: test
  image:
    name: jetbrains/qodana-jvm:2024.3
    entrypoint: [""]
  cache:
    - key: qodana-2024.3-$CI_DEFAULT_BRANCH-$CI_COMMIT_REF_SLUG
      fallback_keys:
        - qodana-2024.3-$CI_DEFAULT_BRANCH-
        - qodana-2024.3-
      paths:
        - .qodana/cache
  variables:
    QODANA_TOKEN: $QODANA_TOKEN
    QODANA_ENDPOINT: "https://qodana.cloud"
  script:
    - qodana --cache-dir=$CI_PROJECT_DIR/.qodana/cache
  allow_failure: true

deploy_dev:
  stage: deploy_dev
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:dev .
    - docker push $CI_REGISTRY_IMAGE:dev
  environment:
    name: development
    url: https://dev.myapp.com
  only:
    - dev

deploy_prod:
  stage: deploy_prod
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  environment:
    name: production
    url: https://myapp.com
  when: manual
  only:
    - main