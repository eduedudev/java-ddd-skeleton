stages:
  - build
  - test
  - deploy_dev
  - deploy_prod

# Etapa de Build
build:
  stage: build
  image: gradle:8.7-jdk21
  script:
    - chmod +x gradlew
    - ./gradlew build -x test -x spotlessJavaCheck --no-daemon
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1h

# Etapa de Test
test:
  stage: test
  image: gradle:8.7-jdk21
  services:
    - docker:19.03.12-dind
  before_script:
    - echo "Esperando que los servicios de DB y RabbitMQ arranquen..."
    - docker-compose -f docker-compose.yml up -d
    - sleep 20  # Esperar a que los servicios se inicien correctamente
  script:
    - chmod +x gradlew
    - ./gradlew test
  after_script:
    - docker-compose -f docker-compose-test.yml down  # Apagar los servicios después de las pruebas
  artifacts:
    reports:
      junit: build/test-results/test/*.xml

# Análisis de código con Qodana
qodana:
  stage: test
  image:
    name: jetbrains/qodana-jvm:2024.3
    entrypoint: [""]
  cache:
    - key: qodana-2024.3-$CI_DEFAULT_BRANCH-$CI_COMMIT_REF_SLUG
      fallback_keys:
        - qodana-2024.3-$CI_DEFAULT_BRANCH-
        - qodana-2024.3-
      paths:
        - .qodana/cache
  variables:
    QODANA_TOKEN: $QODANA_TOKEN
    QODANA_ENDPOINT: "https://qodana.cloud"
  script:
    - qodana --cache-dir=$CI_PROJECT_DIR/.qodana/cache
  allow_failure: true

# Despliegue a Desarrollo (Automático)
deploy_dev:
  stage: deploy_dev
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:dev .
    - docker push $CI_REGISTRY_IMAGE:dev
  environment:
    name: development
    url: https://dev.myapp.com
  only:
    - dev

# Despliegue a Producción (Manual)
deploy_prod:
  stage: deploy_prod
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  environment:
    name: production
    url: https://myapp.com
  when: manual
  only:
    - main
