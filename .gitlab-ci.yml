image: openjdk:21-jdk-slim

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DATABASE_HOST: db
  DATABASE_PORT: 3306
  DATABASE_NAME: jaapec_tenant_service
  DATABASE_USER: dbuser
  DATABASE_PASSWORD: dbpasss
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_LOGIN: kcrqwise
  RABBITMQ_PASSWORD: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
  RABBITMQ_EXCHANGE: domain_events
  RABBITMQ_MAX_RETRIES: 5
  RABBITMQ_VHOST: kcrqwise

stages:
  - infra
  - test

infra:
  stage: infra
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - apk add --no-cache curl
    - curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
    - chmod +x /usr/local/bin/docker-compose
    - docker-compose -f docker-compose-test.yml up -d

test:
  stage: test
  image: openjdk:21-jdk-slim
  script:
    - apt-get update && apt-get install -y mysql-client curl
    - mysql -h "$DATABASE_HOST" -u"$DATABASE_USER" -p"$DATABASE_PASSWORD" -e "SELECT 1;"
    - curl -s -u "$RABBITMQ_LOGIN:$RABBITMQ_PASSWORD" "http://rabbitmq:15672/api/healthchecks/node"
    - chmod +x gradlew
    - ./gradlew test
  dependencies:
    - infra
  after_script:
    - apt install curl
    - curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
    - chmod +x /usr/local/bin/docker-compose
    - docker-compose -f docker-compose-test.yml down
  artifacts:
    reports:
      junit: build/test-results/test/*.xml