cache:
  paths:
    - .gradle/

.config:
  image: openjdk:21-jdk-slim
  before_script:
    - chmod +x ./gradlew

services:
  - name: mariadb:10.7
    alias: db
    variables:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jaapec_tenant_service
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpasss
  - name: rabbitmq:3-management
    alias: rabbitmq
    variables:
      RABBITMQ_DEFAULT_USER: kcrqwise
      RABBITMQ_DEFAULT_PASS: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
      RABBITMQ_DEFAULT_VHOST: kcrqwise

variables:
  DATABASE_HOST: db
  DATABASE_PORT: 3306
  DATABASE_NAME: jaapec_tenant_service
  DATABASE_USER: dbuser
  DATABASE_PASSWORD: dbpasss
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_LOGIN: kcrqwise
  RABBITMQ_PASSWORD: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
  RABBITMQ_VHOST: kcrqwise
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

stages:
  - build
  - test
  - package

build:
  stage: build
  extends:
    .config
  script:
    - ./gradlew assemble -x test
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 days

tests:
  stage: test
  extends:
    .config
  needs:
    - job: build
  script:
    - echo "DEBUG=true" > src/main/resources/.env
    - echo "DATABASE_HOST=$DATABASE_HOST" >> src/main/resources/.env
    - echo "DATABASE_PORT=$DATABASE_PORT" >> src/main/resources/.env
    - echo "DATABASE_NAME=$DATABASE_NAME" >> src/main/resources/.env
    - echo "DATABASE_USER=$DATABASE_USER" >> src/main/resources/.env
    - echo "DATABASE_PASSWORD=$DATABASE_PASSWORD" >> src/main/resources/.env
    - echo "RABBITMQ_HOST=$RABBITMQ_HOST" >> src/main/resources/.env
    - echo "RABBITMQ_PORT=$RABBITMQ_PORT" >> src/main/resources/.env
    - echo "RABBITMQ_LOGIN=$RABBITMQ_LOGIN" >> src/main/resources/.env
    - echo "RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD" >> src/main/resources/.env
    - echo "RABBITMQ_EXCHANGE=domain_events" >> src/main/resources/.env
    - echo "RABBITMQ_MAX_RETRIES=5" >> src/main/resources/.env
    - echo "RABBITMQ_VHOST=$RABBITMQ_VHOST" >> src/main/resources/.env
    - cat src/main/resources/.env
    - ./gradlew test jacocoTestReport
  artifacts:
    paths:
      - build/reports/tests/test/
      - build/reports/jacoco/test/jacocoTestReport.xml
    reports:
      junit: build/test-results/test/**/*.xml
    expire_in: 1 days

build-sonar:
  stage: test
  extends:
    .config
  needs:
    - job: tests
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - ./gradlew sonar -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

docker_build_uat:
  stage: package
  image: docker:latest
  needs:
    - tests
    - build
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  cache: {}
  script:
    - export VERSION=$(cat version.txt)
    - export DEV_IMAGE_TAG="${CI_REGISTRY_IMAGE}:${VERSION}-dev"
    - docker build -t "$DEV_IMAGE_TAG" .
    - docker push "$DEV_IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

docker_build_prod:
  stage: package
  image: docker:latest
  needs:
    - build
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  cache: {}
  script:
    - export VERSION=$(cat version.txt)
    - export IMAGE_TAG="${CI_REGISTRY_IMAGE}:${VERSION}"
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
    - echo "Docker image $IMAGE_TAG built and pushed successfully."
    - export IMAGE_TAG="${CI_REGISTRY_IMAGE}:latest"
    - docker tag "$CI_REGISTRY_IMAGE:$VERSION" "$IMAGE_TAG"
    - docker push "$IMAGE_TAG"
    - echo "Docker image $IMAGE_TAG tagged as latest and pushed successfully."
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
