image: openjdk:21-jdk-slim

services:
  - name: mariadb:10.7
    alias: db # Mismo nombre que en tu Docker Compose
    variables:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jaapec_tenant_service
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpasss
  - name: rabbitmq:3-management
    alias: rabbitmq # Mismo nombre que en Docker Compose
    variables:
      RABBITMQ_DEFAULT_USER: kcrqwise
      RABBITMQ_DEFAULT_PASS: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
      RABBITMQ_DEFAULT_VHOST: kcrqwise

variables:
  # Variables para Spring Boot (igual que en Docker Compose)
  DATABASE_HOST: db
  DATABASE_PORT: 3306
  DATABASE_NAME: jaapec_tenant_service
  DATABASE_USER: dbuser
  DATABASE_PASSWORD: dbpasss
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_LOGIN: kcrqwise
  RABBITMQ_PASSWORD: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
  RABBITMQ_VHOST: kcrqwise

integration-tests:
  stage: test
  script:
    # Instalar netcat para verificar disponibilidad de servicios
    - apt-get update && apt-get install -y netcat
    # Esperar a que MariaDB esté listo
    - echo "Esperando a MariaDB..."
    - while ! nc -z db 3306; do sleep 2; done
    # Esperar a que RabbitMQ esté listo
    - echo "Esperando a RabbitMQ..."
    - while ! nc -z rabbitmq 5672; do sleep 2; done
    - chmod +x gradlew
    - ./gradlew test