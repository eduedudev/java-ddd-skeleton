services:
  # Servicio de MariaDB
  db:
    image: mariadb:10.7
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jaapec_tenant_service
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpasss
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - jaap-network
    restart: always

  # Servicio de RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: kcrqwise
      RABBITMQ_DEFAULT_PASS: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
      RABBITMQ_DEFAULT_VHOST: kcrqwise
    networks:
      - jaap-network
    restart: always

  # Servicio de Spring Boot
  tenant-service:
    build:
      context: .
    container_name: tenant-service
    environment:
      # Variables de entorno para la aplicación Spring Boot
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_NAME: jaapec_tenant_service
      DATABASE_USER: dbuser
      DATABASE_PASSWORD: dbpasss
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_LOGIN: kcrqwise
      RABBITMQ_PASSWORD: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
      RABBITMQ_EXCHANGE: domain_events
      RABBITMQ_MAX_RETRIES: 5
      RABBITMQ_VHOST: kcrqwise
    depends_on:
      - db
      - rabbitmq
    networks:
      - jaap-network
    restart: always

networks:
  jaap-network:
    driver: bridge

volumes:
  db_data:
