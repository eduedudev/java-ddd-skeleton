image: openjdk:21-jdk-slim  # Usa una imagen base con Java 21

services:
  - name: mariadb:10.7
    alias: db  # Nombre de host para MariaDB
    variables:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jaapec_tenant_service
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpasss

  - name: rabbitmq:3-management
    alias: rabbitmq  # Nombre de host para RabbitMQ
    variables:
      RABBITMQ_DEFAULT_USER: kcrqwise
      RABBITMQ_DEFAULT_PASS: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
      RABBITMQ_DEFAULT_VHOST: kcrqwise

variables:
  DATABASE_HOST: db
  DATABASE_PORT: 3306
  DATABASE_NAME: jaapec_tenant_service
  DATABASE_USER: dbuser
  DATABASE_PASSWORD: dbpasss
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_LOGIN: kcrqwise
  RABBITMQ_PASSWORD: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
  RABBITMQ_VHOST: kcrqwise

stages:
  - test

integration-tests:
  stage: test
  script:
    - echo "📌 Listando los servicios en ejecución dentro del job:"
    - ps aux  # Ver qué procesos están corriendo
    - netstat -tlnp  # Ver puertos abiertos (útil para depuración)

    - echo "⌛ Esperando a que MariaDB esté listo..."
    - |
      until mysqladmin ping -h"$DATABASE_HOST" --silent; do
        echo "⏳ Esperando a que MariaDB responda..."
        sleep 2
      done

    - echo "⌛ Esperando a que RabbitMQ esté listo..."
    - |
      until curl -s -u "$RABBITMQ_LOGIN:$RABBITMQ_PASSWORD" "http://$RABBITMQ_HOST:15672/api/healthchecks/node"; do
        echo "⏳ Esperando a que RabbitMQ responda..."
        sleep 2
      done

    - echo "✅ Servicios listos. Ejecutando pruebas..."
    - chmod +x gradlew
    - ./gradlew test
