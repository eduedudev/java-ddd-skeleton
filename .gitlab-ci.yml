image: openjdk:21-jdk-slim 

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DATABASE_HOST: db
  DATABASE_PORT: 3306
  DATABASE_NAME: jaapec_tenant_service
  DATABASE_USER: dbuser
  DATABASE_PASSWORD: dbpasss
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_LOGIN: kcrqwise
  RABBITMQ_PASSWORD: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
  RABBITMQ_EXCHANGE: domain_events
  RABBITMQ_MAX_RETRIES: 5
  RABBITMQ_VHOST: kcrqwise

stages:
  - build
  - test
  - deploy_dev
  - deploy_prod

test:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker-compose -f docker-compose-test.yml up -d
    - docker network ls
    - docker network inspect tenant-service_jaap-network # Nombre completo de la red
    - docker logs rabbitmq
    # Esperar a que MariaDB esté listo
    - |
      echo "⌛ Esperando a que MariaDB esté listo..."
      until docker exec mariadb mysql -u"$DATABASE_USER" -p"$DATABASE_PASSWORD" -e "SELECT 1;"; do
        echo "⏳ Aún no está disponible MariaDB..."
        sleep 2
      done
  script:
    - chmod +x gradlew
    - ./gradlew test
  after_script:
    - docker-compose -f docker-compose-test.yml down
  artifacts:
    reports:
      junit: build/test-results/test/*.xml