services:
  db:
    image: mariadb:10.7
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jaapec_tenant_service
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpasss
    ports:
      - "3306:3306"
    networks:
      - jaap-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: kcrqwise
      RABBITMQ_DEFAULT_PASS: I3SCFxjoQT8zExp7vrx6k5Xr9uOaGx6a
      RABBITMQ_DEFAULT_VHOST: kcrqwise
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - jaap-network

networks:
  jaap-network:
    driver: bridge